name: Security Review

on:
  push:
    branches: [main, master, dev]

concurrency:
  group: security-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check commit count
        id: commit_count
        run: echo "count=$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT

      - name: Save last commit diff
        run: |
          if [ "${{ steps.commit_count.outputs.count }}" -gt 1 ]; then
            git diff HEAD~1..HEAD > /tmp/last-commit.diff
          else
            git show HEAD --stat > /tmp/last-commit.diff
          fi

      - name: Install opencode
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Run security review
        id: review
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          export PATH="$HOME/.opencode/bin:$PATH"

          # Build the security review prompt with the diff
          cat > /tmp/sec-prompt.txt << 'PROMPT_END'
          You are a security code reviewer. Review the following git diff for the last commit.

          Focus ONLY on genuine CRITICAL or HIGH severity security vulnerabilities:
          - Hardcoded secrets (API keys, passwords, tokens, private keys)
          - Command injection via shell.exec, exec, spawn with unsanitized user input
          - SQL injection
          - Path traversal
          - Authentication/authorization bypass
          - Remote code execution
          - Insecure deserialization
          - Sensitive data exposure in logs or responses

          Do NOT report:
          - Minor code style issues or best practice suggestions
          - Hypothetical vulnerabilities requiring unlikely conditions
          - Issues in third-party dependencies
          - False positives

          Diff:
          PROMPT_END

          echo '```diff' >> /tmp/sec-prompt.txt
          cat /tmp/last-commit.diff >> /tmp/sec-prompt.txt
          echo '```' >> /tmp/sec-prompt.txt

          cat >> /tmp/sec-prompt.txt << 'PROMPT_END'

          End your response with exactly one of these lines (on its own line):
          SECURITY_ISSUES_FOUND
          NO_SECURITY_ISSUES
          PROMPT_END

          # Run the review
          opencode run --model "opencode/deepseek-v4-flash-free" < /tmp/sec-prompt.txt 2>/dev/null | tee /tmp/review-output.txt

          # Set output for next steps
          if grep -q "SECURITY_ISSUES_FOUND" /tmp/review-output.txt; then
            echo "issues_found=true" >> $GITHUB_OUTPUT
          else
            echo "issues_found=false" >> $GITHUB_OUTPUT
          fi

      - name: Create PR for security issues
        if: steps.review.outputs.issues_found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export PATH="$HOME/.opencode/bin:$PATH"
          SHORT_SHA=$(git rev-parse --short HEAD)
          BRANCH="security/review-$SHORT_SHA"

          git checkout -b "$BRANCH"

          # Try to auto-fix the issues
          opencode run --model "opencode/deepseek-v4-flash-free" << 'FIX_END' 2>/dev/null || true
          Fix the security vulnerabilities identified in the codebase.
          Only edit existing files. Only fix genuine security issues.
          Do not create new files.
          FIX_END

          # Build PR body from review output
          cat > /tmp/pr-body.md << 'PR_HEADER'
          ## 🔒 Security Review

          Automated review of the last commit found potential security issues.

          ### Review Output
          ```
          PR_HEADER

          cat /tmp/review-output.txt >> /tmp/pr-body.md

          cat >> /tmp/pr-body.md << 'PR_FOOTER'

          ```

          ---
          _Generated by OpenCode Security Review_
          PR_FOOTER

          # Create commits and push
          if git diff --quiet; then
            echo "No automatic fixes applied. Creating informational PR."
            git commit --allow-empty -m "security: review findings for $SHORT_SHA"
            git push origin "$BRANCH"

            gh pr create \
              --base "${{ github.ref_name }}" \
              --head "$BRANCH" \
              --title "🔒 Security review: $SHORT_SHA" \
              --body-file /tmp/pr-body.md
          else
            echo "Fixes applied. Creating fix PR."
            git add -A
            git commit -m "fix: resolve security vulnerabilities in $SHORT_SHA"
            git push origin "$BRANCH"

            gh pr create \
              --base "${{ github.ref_name }}" \
              --head "$BRANCH" \
              --title "🔒 Security fixes: $SHORT_SHA" \
              --body-file /tmp/pr-body.md
          fi
