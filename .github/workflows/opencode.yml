name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  push:
    branches: [dev]

jobs:
  opencode:
    if: |
      (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') &&
      (contains(github.event.comment.body, ' /oc') ||
       startsWith(github.event.comment.body, '/oc') ||
       contains(github.event.comment.body, ' /opencode') ||
       startsWith(github.event.comment.body, '/opencode'))
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: opencode-go/minimax-m3

  review:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Save last commit diff
        run: |
          if [ "$(git rev-list --count HEAD)" -gt 1 ]; then
            git diff HEAD~1..HEAD > /tmp/last-commit.diff
          else
            git show HEAD --stat > /tmp/last-commit.diff
          fi

      - name: Install opencode
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Review commit with opencode
        id: review
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          export PATH="$HOME/.opencode/bin:$PATH"

          cat > /tmp/review-prompt.txt << 'PROMPT_END'
          Review the following git diff for the last commit on the dev branch.
          Provide a concise code review focused on:
          - Bugs, logic errors, regressions
          - Security issues (hardcoded secrets, injection, auth bypass, path traversal)
          - Performance regressions
          - Breaking changes

          Do not report minor style nitpicks or hypothetical issues.

          Diff:
          PROMPT_END

          echo '```diff' >> /tmp/review-prompt.txt
          cat /tmp/last-commit.diff >> /tmp/review-prompt.txt
          echo '```' >> /tmp/review-prompt.txt

          opencode run --model "opencode/deepseek-v4-flash-free" < /tmp/review-prompt.txt 2>/dev/null | tee /tmp/review-output.txt

      - name: Create PR to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)

          cat > /tmp/pr-body.md << 'PR_HEADER'
          ## Code Review

          Automated review of the last commit on `dev`.

          ### Review Output
          ```
          PR_HEADER

          cat /tmp/review-output.txt >> /tmp/pr-body.md

          cat >> /tmp/pr-body.md << 'PR_FOOTER'

          ```

          ---
          _Generated by OpenCode Review_
          PR_FOOTER

          EXISTING=$(gh pr list --base main --head dev --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already open, posting review as comment"
            gh pr comment "$EXISTING" --body-file /tmp/pr-body.md
          else
            gh pr create \
              --base main \
              --head dev \
              --title "Review: $SHORT_SHA" \
              --body-file /tmp/pr-body.md \
              --reviewer samarth-na
          fi